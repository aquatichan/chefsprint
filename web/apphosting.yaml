# Firebase App Hosting config for the Next.js frontend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
  concurrency: 80

env:
  # URL of the deployed engine (Cloud Run). Set to your service URL.
  - variable: NEXT_PUBLIC_API_BASE
    value: "https://chefsprint-engine-REPLACE.run.app"
    availability:
      - BUILD
      - RUNTIME

  # Firebase web config (public). Prefer wiring these as App Hosting values/secrets.
  # - variable: NEXT_PUBLIC_FIREBASE_API_KEY
  #   value: ""
  # - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  #   value: "your-project.firebaseapp.com"
  # - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
  #   value: "your-project"
  # - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  #   value: "your-project.appspot.com"
  # - variable: NEXT_PUBLIC_FIREBASE_APP_ID
  #   value: ""
